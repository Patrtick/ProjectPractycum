<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Сайт работает 🚀</h1>
    <p>Frontend поднят через Docker</p>

    <h2>Ответ от backend:</h2>
    <p id="api-data">Загрузка...</p>

    <script>
        fetch('http://localhost:3000/api')
            .then(res => res.json())
            .then(data => {
                document.getElementById('api-data').innerText = data.message;
            })
            .catch(err => {
                document.getElementById('api-data').innerText = 'Ошибка подключения к backend';
                console.error(err);
            });
    </script>
</body>
</html>
