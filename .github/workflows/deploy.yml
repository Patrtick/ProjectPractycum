name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: 10.40.241.63
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/ProjectPractycum
            git pull
            docker-compose down
            docker-compose up -d --build