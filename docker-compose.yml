version: '3.8'

services:
  backend:
    build: ./backend
    container_name: app-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: app-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge